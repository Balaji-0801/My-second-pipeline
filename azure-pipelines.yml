trigger:
- main

pool:
  vmImage: 'windows-latest'

steps:
- checkout: self

# Step 1: Install Node.js
- task: NodeTool@0
  inputs:
    versionSpec: '20.x'
  displayName: 'Install Node.js'

# Step 2: Run Node.js apps locally (use full path)
- script: |
    node "$(Build.SourcesDirectory)\app.js"
    node "$(Build.SourcesDirectory)\app1.js"
  displayName: 'Run Node.js apps locally'

# Step 3: Create Windows 11 VM in VMware Aria
- task: PowerShell@2
  inputs:
    targetType: 'inline'
    script: |
      # VM name with timestamp
      $vmName = "CI-CD-Win11-$(Get-Date -Format yyyyMMddHHmmss)"

      # Template ID from VMware Aria
      $vmTemplateId = "209bd02e-d7d1-4ea2-ad0e-ba215ce60a9e"

      # API URL
      $apiUrl = "https://srv01vra1.corp.trumpf.com/catalog/api/consumer/entitledCatalogItems/209bd02e-d7d1-4ea2-ad0e-ba215ce60a9e/requests"

      # VMware Aria credentials
      $username = "sundaramba"
      $password = "Domain@54321Service@54321"

      # Combine username and password safely
      $pair = "$($username):$($password)"
      $encodedCreds = [Convert]::ToBase64String([System.Text.Encoding]::ASCII.GetBytes($pair))

      # HTTP headers
      $headers = @{
          "Authorization" = "Basic $encodedCreds"
          "Content-Type" = "application/json"
      }

      # JSON body to request VM
      $body = @{
          "requestData" = @{
              "name" = $vmName
              "parameters" = @{
                  "CPU" = "2"
                  "Memory" = "8GB"
                  "OS" = "Windows-11"
              }
          }
      } | ConvertTo-Json -Depth 10

      # Invoke the VMware Aria API
      Invoke-RestMethod -Uri $apiUrl -Method Post -Headers $headers -Body $body
      Write-Output "Windows 11 VM $vmName creation request sent!"